name: Release

on:
  push:
    tags:
      - "v*"
  # On-demand validation build. Produces an installer as a downloadable
  # workflow artifact WITHOUT publishing a GitHub Release — useful for
  # smoke-testing a Windows build before cutting a real `v*` tag.
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build (validation only; artifact, no publish)"
        type: choice
        default: win
        options:
          - win
          - mac
          - linux
          - all

permissions:
  contents: write

jobs:
  # Build the matrix dynamically so a workflow_dispatch run only spins up the
  # chosen platform. (A job-level `if` can't read the `matrix` context, so the
  # selection has to happen before the matrix is expanded.)
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -e
          mac='{"os":"macos-latest","platform":"mac","ebargs":"--mac --x64 --arm64"}'
          win='{"os":"windows-latest","platform":"win","ebargs":"--win"}'
          linux='{"os":"ubuntu-latest","platform":"linux","ebargs":"--linux"}'
          sel="all"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sel="${{ github.event.inputs.platform }}"
          fi
          case "$sel" in
            win)   inc="$win" ;;
            mac)   inc="$mac" ;;
            linux) inc="$linux" ;;
            *)     inc="$mac,$win,$linux" ;;
          esac
          echo "matrix={\"include\":[$inc]}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # @grandchef/node-printer's binding.gyp uses `cups-config --cflags`
      # to find CUPS headers on Linux. Ubuntu runners ship without them.
      - name: Install CUPS dev libs (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev

      - run: npm ci

      - run: npm run build

      # Pass through signing env vars ONLY when the corresponding secrets
      # are actually set. Passing CSC_LINK="" makes electron-builder
      # treat the empty string as a file path and explode.
      - name: Configure signing env from secrets
        shell: bash
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CERT_P12_BASE64: ${{ secrets.WIN_CERT_P12_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          set -e
          # Mac signing — only export if cert secret is present
          if [ -n "$MAC_CERT_P12_BASE64" ]; then
            echo "CSC_LINK=$MAC_CERT_P12_BASE64" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$MAC_CERT_PASSWORD" >> "$GITHUB_ENV"
            echo "MAC_NOTARIZE_FLAG=-c.mac.notarize=true" >> "$GITHUB_ENV"
          else
            echo "MAC_NOTARIZE_FLAG=" >> "$GITHUB_ENV"
          fi
          # Notarization creds — only export when present
          if [ -n "$APPLE_ID" ]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          fi
          # Windows signing
          if [ -n "$WIN_CERT_P12_BASE64" ]; then
            echo "WIN_CSC_LINK=$WIN_CERT_P12_BASE64" >> "$GITHUB_ENV"
            echo "WIN_CSC_KEY_PASSWORD=$WIN_CERT_PASSWORD" >> "$GITHUB_ENV"
          fi

      # Tag push -> publish a GitHub Release. workflow_dispatch -> build only
      # (--publish never) and attach the installer as an artifact below.
      - name: Package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUBLISH=never
          if [ "${{ github.event_name }}" = "push" ]; then PUBLISH=always; fi
          npx electron-builder ${{ matrix.ebargs }} ${MAC_NOTARIZE_FLAG:-} --publish "$PUBLISH"

      - name: Upload installer (validation artifact)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: print-bridge-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
          if-no-files-found: warn
